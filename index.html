<script>
fetch('data.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("content");
    container.innerHTML = "";

    data.articles.forEach(item => {
      container.innerHTML += `
        <div class="card">
          <h3>${item.title}</h3>
          <p><b>Category:</b> ${item.category}</p>
          <p>${item.summary}</p>
          <p><b>Why PM Should Care:</b> ${item.why_pm_care}</p>
          <p><b>Skills Mentioned:</b> ${item.skills.join(", ")}</p>
          <a href="${item.link}" target="_blank">Read More</a>
        </div>
      `;
    });
  });
</script>
